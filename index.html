  <script type="text/babel" data-type="module">
    import { createRoot } from 'react-dom/client';
    
import React, { useState, useRef, useEffect, memo, useMemo } from 'react';
import { 
  Layout, Play, Pause, ArrowLeft, Plus, Trash2, VolumeX, Volume2, 
  Download, X, Video, Clock, Pencil,
  Settings2, ChevronLeft, ZoomIn, MoveHorizontal, MoveVertical, Speaker, Loader2,

const HIGHLIGHT_COLOR = '#1ca3ec';

const ASPECT_RATIOS = [
  { id: 'vertical', name: '9:16', styleRatio: '9 / 16', ratio: 9 / 16 },
  { id: 'portrait', name: '4:5', styleRatio: '4 / 5', ratio: 4 / 5 },
  { id: 'square', name: '1:1', styleRatio: '1 / 1', ratio: 1 / 1 },
  { id: 'horizontal', name: '16:9', styleRatio: '16 / 9', ratio: 16 / 9 },
];

const TEMPLATES = [
  { id: '1x2', sections: 2, cols: 1, rows: 2, layout: [{x:0,y:0,w:1,h:0.5}, {x:0,y:0.5,w:1,h:0.5}] },
  { id: '2x1', sections: 2, cols: 2, rows: 1, layout: [{x:0,y:0,w:0.5,h:1}, {x:0.5,y:0,w:0.5,h:1}] },
  { id: '2x2', sections: 4, cols: 2, rows: 2, layout: [{x:0,y:0,w:0.5,h:0.5}, {x:0.5,y:0,w:0.5,h:0.5}, {x:0,y:0.5,w:0.5,h:0.5}, {x:0.5,y:0.5,w:0.5,h:0.5}] },
  { id: '1x3', sections: 3, cols: 1, rows: 3, layout: [{x:0,y:0,w:1,h:1/3}, {x:0,y:1/3,w:1,h:1/3}, {x:0,y:2/3,w:1,h:1/3}] },
  { id: '1top2bot', sections: 3, cols: 2, rows: 2, customSpans: { 0: { gridColumn: 'span 2' } }, layout: [{x:0,y:0,w:1,h:0.5}, {x:0,y:0.5,w:0.5,h:0.5}, {x:0.5,y:0.5,w:0.5,h:0.5}] },
  { id: '1left2right', sections: 3, cols: 2, rows: 2, customSpans: { 0: { gridRow: 'span 2' } }, layout: [{x:0,y:0,w:0.5,h:1}, {x:0.5,y:0,w:0.5,h:0.5}, {x:0.5,y:0.5,w:0.5,h:0.5}] },
  { id: '3x1', sections: 3, cols: 3, rows: 1, layout: [{x:0,y:0,w:1/3,h:1}, {x:1/3,y:0,w:1/3,h:1}, {x:2/3,y:0,w:1/3,h:1}] },
  { id: '1x4', sections: 4, cols: 1, rows: 4, layout: [{x:0,y:0,w:1,h:0.25}, {x:0,y:0.25,w:1,h:0.25}, {x:0,y:0.5,w:1,h:0.25}, {x:0,y:0.75,w:1,h:0.25}] },
  { id: '2x3', sections: 6, cols: 2, rows: 3, layout: [{x:0,y:0,w:0.5,h:1/3}, {x:0.5,y:0,w:0.5,h:1/3}, {x:0,y:1/3,w:0.5,h:1/3}, {x:0.5,y:1/3,w:0.5,h:1/3}, {x:0,y:2/3,w:0.5,h:1/3}, {x:0.5,y:2/3,w:0.5,h:1/3}] },
];

const FILTERS = [
  { id: 'none', name: 'None', css: 'none' },
  { id: 'grayscale', name: 'B&W', css: 'grayscale(100%)' },
];

const GeometricIcon = memo(({ id, active, isDarkMode }) => {
  const baseSize = 12;
  let width = baseSize;
  let height = baseSize;

  switch (id) {
    case 'vertical': width = baseSize * (9 / 16); break;
    case 'portrait': width = baseSize * (4 / 5); break;
    case 'square': width = baseSize; break;
    case 'horizontal': height = baseSize * (9 / 16); break;
    default: break;
  }

  return (
    <div 
      className={`rounded-[1px] border-[1.5px] transition-all duration-300`} 
      style={{ 
        width: `${width}px`, 
        height: `${height}px`,
        borderColor: active ? HIGHLIGHT_COLOR : (isDarkMode ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.4)'),
        transform: active ? 'scale(1.1)' : 'scale(1)'
      }} 
    />
  );
});

const initDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open('StitchProDB', 3); 
  req.onupgradeneeded = (e) => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains('assets')) db.createObjectStore('assets');
    if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta');
    if (!db.objectStoreNames.contains('audioChunks')) db.createObjectStore('audioChunks');
  };
  req.onsuccess = () => resolve(req.result);
  req.onerror = () => reject(req.error);
});

const saveToIDB = async (store, key, value) => {
  try { const db = await initDB(); db.transaction(store, 'readwrite').objectStore(store).put(value, key); } catch (e) {}
};
const removeFromIDB = async (store, key) => {
  try { const db = await initDB(); db.transaction(store, 'readwrite').objectStore(store).delete(key); } catch (e) {}
};
const clearStoreIDB = async (store) => {
  try { const db = await initDB(); db.transaction(store, 'readwrite').objectStore(store).clear(); } catch (e) {}
};

const formatTime = (seconds) => {
  if (typeof seconds !== 'number' || isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '0:00.00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  const ms = Math.floor((seconds % 1) * 100);
  return `${m}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
};

const QuickToolOverlay = ({ title, icon: Icon, value, min, max, step = 1, onChange, active, onClose, isDarkMode }) => {
  if (!active) return null;
  return (
    <div className={`absolute bottom-full mb-4 left-1/2 -translate-x-1/2 w-64 p-6 rounded-[2rem] border shadow-[0_40px_100px_-20px_rgba(0,0,0,0.8)] transition-all duration-500 animate-in fade-in zoom-in slide-in-from-bottom-4 z-[150] ${isDarkMode ? 'bg-[#0a0a0a]/90 backdrop-blur-3xl border-white/10' : 'bg-white/95 backdrop-blur-3xl border-black/10'}`}>
      <div className="flex justify-between items-center mb-6">
        <div className="flex items-center gap-3">
          <Icon size={14} className="text-blue-500" />
          <span className="text-[10px] font-black uppercase tracking-[0.2em]">{title}</span>
        </div>
        <span className="text-[11px] font-bold opacity-60 tabular-nums">{Number(value).toFixed(1)}</span>
      </div>
      <input 
        type="range" 
        min={min} 
        max={max} 
        step={step}
        value={value} 
        onChange={(e) => onChange(Number(e.target.value))} 
        className={`w-full h-1.5 rounded-full appearance-none cursor-pointer transition-all ${isDarkMode ? 'bg-white/10 accent-blue-500 hover:bg-white/20' : 'bg-black/10 accent-blue-500 hover:bg-black/20'}`} 
      />
      <button onClick={onClose} className="absolute -top-2 -right-2 w-8 h-8 bg-black text-white rounded-full flex items-center justify-center backdrop-blur-md md:hidden shadow-xl border border-white/10"><X size={14}/></button>
    </div>
  );
};

const EXPORT_WORKER_BLOB = URL.createObjectURL(new Blob([`
  importScripts('https://unpkg.com/mp4-muxer');

  let muxer;
  let videoEncoder;
  let audioEncoder;
  let canvas;
  let ctx;

  self.onmessage = async (e) => {
    const { type, data } = e.data;

    if (type === 'INIT') {
      const { width, height, fps, bitrate, sampleRate, numberOfChannels, offscreenCanvas } = data;
      
      canvas = offscreenCanvas;
      ctx = canvas.getContext('2d', { alpha: false, colorSpace: 'srgb', desynchronized: true });
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      muxer = new Mp4Muxer.Muxer({
        target: new Mp4Muxer.ArrayBufferTarget(),
        video: { codec: 'avc', width, height },
        audio: { codec: 'aac', sampleRate, numberOfChannels },
        fastStart: 'in-memory'
      });

      videoEncoder = new VideoEncoder({
        output: (chunk, metadata) => muxer.addVideoChunk(chunk, metadata),
        error: (e) => self.postMessage({ type: 'ERROR', data: 'VideoEncoder Error: ' + e.message })
      });

      videoEncoder.configure({
        codec: 'avc1.640034',
        width, height,
        bitrate,
        framerate: fps,
        hardwareAcceleration: 'prefer-hardware'
      });

      audioEncoder = new AudioEncoder({
        output: (chunk, metadata) => muxer.addAudioChunk(chunk, metadata),
        error: (e) => self.postMessage({ type: 'ERROR', data: 'AudioEncoder Error: ' + e.message })
      });

      audioEncoder.configure({
        codec: 'mp4a.40.2',
        numberOfChannels,
        sampleRate,
        bitrate: 128000
      });

      self.postMessage({ type: 'READY' });
    }

    if (type === 'ENCODE_FRAME') {
      const { 
        timestamp, 
        sourceFrames, 
        audioData, 
        keyFrame,
        layoutConfig,
        bgColor,
        spacing,
        radius
      } = data;

      try {
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        layoutConfig.forEach((item) => {
          const frame = sourceFrames[item.slotId];
          if (!frame) return;

          const cellW = (canvas.width * item.w) - spacing;
          const cellH = (canvas.height * item.h) - spacing;
          const cellX = (canvas.width * item.x) + (spacing / 2);
          const cellY = (canvas.height * item.y) + (spacing / 2);

          ctx.save();
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(cellX, cellY, cellW, cellH, radius);
          else ctx.rect(cellX, cellY, cellW, cellH);
          ctx.clip();

          const vw = frame.displayWidth;
          const vh = frame.displayHeight;
          const transform = item.transform;
          const baseScale = Math.max(cellW / vw, cellH / vh);
          const drawW = vw * baseScale * transform.zoom;
          const drawH = vh * baseScale * transform.zoom;
          const drawX = cellX + ((cellW - drawW) * ((50 - transform.x) / 100));
          const drawY = cellY + ((cellH - drawH) * ((50 + transform.y) / 100));

          if (item.filter !== 'none') ctx.filter = item.filter;
          ctx.drawImage(frame, drawX, drawY, drawW, drawH);
          ctx.restore();
          frame.close(); 
        });

        const compositeFrame = new VideoFrame(canvas, { timestamp });
        videoEncoder.encode(compositeFrame, { keyFrame });
        compositeFrame.close();
        
        if (audioData) {
          audioEncoder.encode(audioData);
          audioData.close();
        }

        self.postMessage({ type: 'ACK' });
      } catch (err) {
        self.postMessage({ type: 'ERROR', data: 'Encoding loop error: ' + err.message });
      }
    }

    if (type === 'FINALIZE') {
      try {
        await videoEncoder.flush();
        await audioEncoder.flush();
        muxer.finalize();
        const { buffer } = muxer.target;
        self.postMessage({ type: 'FINISHED', data: buffer }, [buffer]);
      } catch (err) {
        self.postMessage({ type: 'ERROR', data: 'Finalization Error: ' + err.message });
      }
    }
  };
`], { type: 'application/javascript' }));

export default function App() {
  const [isDarkMode, setIsDarkMode] = useState(true);
  const [selectedTemplate, setSelectedTemplate] = useState(null);
  const [slots, setSlots] = useState({}); 
  const [aspectRatio, setAspectRatio] = useState(ASPECT_RATIOS[0]);
  const [spacing, setSpacing] = useState(6);
  const [radius, setRadius] = useState(12);
  const [bgColor, setBgColor] = useState('#000000');
  
  const [isPlaying, setIsPlaying] = useState(false);
  const [activeEditIndex, setActiveEditIndex] = useState(null);
  const [activeQuickTool, setActiveQuickTool] = useState(null); 
  const [editorTab, setEditorTab] = useState('sync'); 
  const [showExportModal, setShowExportModal] = useState(false);
  const [exportRes, setExportRes] = useState('1080p');
  const [exportFps, setExportFps] = useState(30);
  const [inspectorCurrentTime, setInspectorCurrentTime] = useState(0);
  
  const [exportStatus, setExportStatus] = useState({ active: false, phase: '', progress: 0 });
  const [muxerLoaded, setMuxerLoaded] = useState(false);

  const [isPreparing, setIsPreparing] = useState(false);
  const [isLoaded, setIsLoaded] = useState(false);

  const [editorBoxSize, setEditorBoxSize] = useState({ width: 0, height: 0 });
  const workspaceRef = useRef(null);

  const uploadIndexRef = useRef(null);
  const videoRefs = useRef({});
  const fileInputRef = useRef(null);
  const colorInputRef = useRef(null);
  const panRef = useRef({ isDragging: false, startX: 0, startY: 0, initPanX: 0, initPanY: 0, rect: null });

  const isMobile = useMemo(() => /iPhone|iPad|iPod|Android/i.test(navigator.userAgent), []);

  const syncData = useMemo(() => {
    const slotEntries = Object.entries(slots).filter(([_, data]) => !!data.url);
    if (slotEntries.length === 0) return { maxAnchor: 0, offsets: {}, active: false };

    let maxAnchor = 0;
    let hasAnchors = false;
    slotEntries.forEach(([id, data]) => {
      const anchor = data.anchor || 0;
      if (anchor > 0) hasAnchors = true;
      if (anchor > maxAnchor) maxAnchor = anchor;
    });

    const offsets = {};
    slotEntries.forEach(([id, data]) => {
      offsets[id] = maxAnchor - (data.anchor || 0);
    });

    return { maxAnchor, offsets, active: hasAnchors };
  }, [slots]);

  useEffect(() => {
    if (!selectedTemplate || !workspaceRef.current) return;

    const calculateSize = () => {
      const parent = workspaceRef.current;
      if (!parent) return;

      const isEditing = activeEditIndex !== null;
      const basePadding = window.innerWidth < 768 ? (isEditing ? 24 : 40) : (isEditing ? 48 : 120);
      
      const availableWidth = parent.clientWidth - basePadding;
      const availableHeight = parent.clientHeight - basePadding;
      const targetRatio = aspectRatio.ratio;

      let finalWidth, finalHeight;

      if (availableWidth / availableHeight > targetRatio) {
        finalHeight = availableHeight;
        finalWidth = availableHeight * targetRatio;
      } else {
        finalWidth = availableWidth;
        finalHeight = availableWidth / targetRatio;
      }

      setEditorBoxSize({ width: finalWidth, height: finalHeight });
    };

    const observer = new ResizeObserver(calculateSize);
    observer.observe(workspaceRef.current);
    calculateSize();

    return () => observer.disconnect();
  }, [selectedTemplate, aspectRatio, activeEditIndex]);

  useEffect(() => {
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/mp4-muxer';
    script.onload = () => setMuxerLoaded(true);
    document.head.appendChild(script);
  }, []);

  useEffect(() => {
    const loadProject = async () => {
      try {
        const db = await initDB();
        const metaReq = db.transaction('meta').objectStore('meta').get('projectState');
        metaReq.onsuccess = (e) => {
          const meta = e.target.result;
          if (!meta) { setIsLoaded(true); return; }
          if (meta.templateId) setSelectedTemplate(TEMPLATES.find(t => t.id === meta.templateId));
          setAspectRatio(ASPECT_RATIOS.find(r => r.id === meta.aspectRatioId) || ASPECT_RATIOS[0]);
          setSpacing(meta.spacing ?? 6);
          setRadius(meta.radius ?? 12);
          setBgColor(meta.bgColor ?? '#000000');

          const assetsReq = db.transaction('assets').objectStore('assets').getAllKeys();
          assetsReq.onsuccess = (e) => {
            const keys = e.target.result;
            const restoredSlots = meta.slots || {};
            let loadedCount = 0;
            if (keys.length === 0) { setIsLoaded(true); return; }
            keys.forEach(key => {
              const getReq = db.transaction('assets').objectStore('assets').get(key);
              getReq.onsuccess = (ev) => {
                const blob = ev.target.result;
                if (blob && restoredSlots[key]) {
                  const url = URL.createObjectURL(blob);
                  restoredSlots[key].url = url;
                }
                loadedCount++;
                if (loadedCount === keys.length) { setSlots(restoredSlots); setIsLoaded(true); }
              };
            });
          };
        };
        metaReq.onerror = () => setIsLoaded(true);
      } catch (e) { setIsLoaded(true); }
    };
    loadProject();
  }, []);

  useEffect(() => {
    if (!isLoaded) return;
    const t = setTimeout(() => {
      const cleanSlots = {};
      Object.entries(slots).forEach(([id, data]) => {
          const { url, ...rest } = data;
          cleanSlots[id] = rest;
      });
      const meta = {
        templateId: selectedTemplate?.id, aspectRatioId: aspectRatio.id,
        spacing, radius, bgColor, slots: cleanSlots
      };
      saveToIDB('meta', 'projectState', meta);
    }, 1000); 
    return () => clearTimeout(t);
  }, [selectedTemplate, aspectRatio, spacing, radius, bgColor, slots, isLoaded]);

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        toggleGlobalPlay();
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [isPlaying, slots, syncData]);

  const updateSlot = (id, partial) => {
    setSlots(prev => ({ ...prev, [id]: { ...prev[id], ...partial } }));
  };

  const clearSlotMemory = (id) => {
    if (slots[id]?.url) URL.revokeObjectURL(slots[id].url);
  };

  const handleTemplateSelect = (template) => {
    Object.keys(slots).forEach(clearSlotMemory);
    setSelectedTemplate(template);
    setSlots({});
    setActiveEditIndex(null);
    setIsPlaying(false);
    clearStoreIDB('assets');
  };

  const handleBack = () => {
    Object.keys(slots).forEach(clearSlotMemory);
    setSelectedTemplate(null);
    setSlots({});
    setActiveEditIndex(null);
    setIsPlaying(false);
    clearStoreIDB('assets');
  };

  const triggerUpload = (index = null) => {
    uploadIndexRef.current = index;
    if (fileInputRef.current) { 
      fileInputRef.current.value = ''; 
      fileInputRef.current.click(); 
    }
  };

  const processFiles = (files, targetIndex = null) => {
    const fileArray = Array.from(files).filter(f => f.type.startsWith('video/'));
    if (fileArray.length === 0) return;

    setSlots(prev => {
      let nextSlots = { ...prev };
      let currentIndex = targetIndex !== null ? targetIndex : 0;
      for (const file of fileArray) {
        if (targetIndex === null || fileArray.indexOf(file) > 0) {
          while (currentIndex < selectedTemplate.sections && nextSlots[currentIndex] && fileArray.length > 1) { 
            currentIndex++; 
          }
        }
        if (currentIndex >= selectedTemplate.sections) break;
        if (nextSlots[currentIndex]?.url) URL.revokeObjectURL(nextSlots[currentIndex].url);
        nextSlots[currentIndex] = {
          url: URL.createObjectURL(file),
          duration: 0, muted: true, volume: 1, 
          filterId: 'none',
          anchor: 0,
          transform: { zoom: 1, x: 0, y: 0, startTime: 0 }
        };
        saveToIDB('assets', currentIndex, file); 
        currentIndex++;
      }
      return nextSlots;
    });
    uploadIndexRef.current = null;
  };

  const handleFileChange = (e) => processFiles(e.target.files, uploadIndexRef.current);

  const swapSlots = (idxA, idxB) => {
    setSlots(prev => {
      const next = { ...prev };
      const temp = next[idxA];
      next[idxA] = next[idxB];
      next[idxB] = temp;
      return next;
    });
    const doSwap = async () => {
      try {
        const db = await initDB();
        const tx = db.transaction('assets', 'readwrite');
        const store = tx.objectStore('assets');
        const fileA = await new Promise(r => store.get(idxA).onsuccess = e => r(e.target.result));
        const fileB = await new Promise(r => store.get(idxB).onsuccess = e => r(e.target.result));
        if (fileA) store.put(fileA, idxB); else store.delete(idxB);
        if (fileB) store.put(fileB, idxA); else store.delete(idxA);
      } catch(e){}
    };
    doSwap();
    if (activeEditIndex === idxA) setActiveEditIndex(idxB);
    else if (activeEditIndex === idxB) setActiveEditIndex(idxA);
  };

  const handleOSDrop = (e, overrideIndex = null) => {
    e.preventDefault();
    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      processFiles(e.dataTransfer.files, overrideIndex);
    }
  };

  const handleCellDragStart = (e, i) => {
    if (activeEditIndex === i) return e.preventDefault();
    e.dataTransfer.setData('text/plain', i.toString());
    e.dataTransfer.effectAllowed = 'move';
  };

  const handleCellDrop = (e, targetIndex) => {
    e.preventDefault(); e.stopPropagation(); 
    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      processFiles(e.dataTransfer.files, targetIndex); 
      return;
    }
    const sourceIndexStr = e.dataTransfer.getData('text/plain');
    const sourceIndex = parseInt(sourceIndexStr, 10);
    if (!isNaN(sourceIndex) && sourceIndex !== targetIndex) swapSlots(sourceIndex, targetIndex);
  };

  const handlePanStart = (e, i) => {
    if (activeEditIndex !== i) return;
    panRef.current = {
        isDragging: true, 
        startX: e.clientX || (e.touches && e.touches[0].clientX), 
        startY: e.clientY || (e.touches && e.touches[0].clientY),
        initPanX: slots[i]?.transform.x || 0, 
        initPanY: slots[i]?.transform.y || 0,
        rect: e.currentTarget.getBoundingClientRect()
    };
  };

  const handlePanMove = (e, i) => {
    if (!panRef.current.isDragging || activeEditIndex !== i) return;
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    const dx = clientX - panRef.current.startX;
    const dy = clientY - panRef.current.startY;
    const rect = panRef.current.rect;
    const zoom = slots[i]?.transform.zoom || 1;
    const percentX = (dx / rect.width) * 100 / zoom;
    const percentY = (dy / rect.height) * 100 / zoom;
    let newX = Math.max(-100, Math.min(100, panRef.current.initPanX + percentX));
    let newY = Math.max(-100, Math.min(100, panRef.current.initPanY - percentY));
    updateSlot(i, { transform: { ...slots[i].transform, x: newX, y: newY } });
  };

  const handlePanEnd = () => { panRef.current.isDragging = false; };

  const toggleGlobalPlay = () => {
    const nextPlayState = !isPlaying;
    setIsPlaying(nextPlayState);

    Object.entries(videoRefs.current).forEach(([index, videoEl]) => {
      if (videoEl && slots[index]) {
        if (nextPlayState) {
          if (syncData.active) {
            const delay = syncData.offsets[index] || 0;
            videoEl.pause();
            videoEl.currentTime = 0;
            setTimeout(() => {
               if (videoEl && nextPlayState) videoEl.play().catch(()=>{});
            }, delay * 1000);
          } else {
            videoEl.currentTime = slots[index].transform.startTime || 0;
            videoEl.play().catch(()=>{});
          }
        } else {
          videoEl.pause();
        }
      }
    });
  };

  const handleLinkedScrub = (time) => {
    setInspectorCurrentTime(time);
    const vid = videoRefs.current[activeEditIndex];
    if (vid) vid.currentTime = time;

    if (syncData.active) {
      const masterTime = time + (syncData.offsets[activeEditIndex] || 0);
      Object.entries(videoRefs.current).forEach(([idx, videoEl]) => {
        if (videoEl && idx !== activeEditIndex.toString() && slots[idx]) {
          const targetOffset = syncData.offsets[idx] || 0;
          videoEl.currentTime = Math.max(0, Math.min(videoEl.duration, masterTime - targetOffset));
        }
      });
    }
  };

  const handleInspectorStep = (dir) => {
    const vid = videoRefs.current[activeEditIndex];
    if (vid) {
      const step = 1/30; 
      const nextTime = Math.max(0, Math.min(vid.duration, vid.currentTime + (dir * step)));
      handleLinkedScrub(nextTime);
    }
  };

  const navigateClips = (dir) => {
    const sectionCount = selectedTemplate?.sections || 0;
    if (sectionCount === 0) return;
    
    let nextIndex = (activeEditIndex + dir + sectionCount) % sectionCount;
    const start = nextIndex;
    while (!slots[nextIndex]?.url && nextIndex !== activeEditIndex) {
      nextIndex = (nextIndex + dir + sectionCount) % sectionCount;
      if (nextIndex === start) break;
    }
    
    if (slots[nextIndex]?.url) {
      setActiveEditIndex(nextIndex);
      const nextVid = videoRefs.current[nextIndex];
      if (nextVid) setInspectorCurrentTime(nextVid.currentTime);
    }
  };

  const downloadFinalMp4 = (blob, config) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `stitchpro_${config.res}_${Date.now()}.mp4`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Increased timeout for mobile to ensure the download actually starts
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  };

  const handleStartExportBtn = async () => {
    if (Object.keys(slots).length === 0 || !muxerLoaded) return;
    setIsPreparing(true); setShowExportModal(false);
    
    let maxTotalDuration = 0;
    Object.entries(slots).forEach(([id, data]) => {
        const d = data.duration; 
        if (d && isFinite(d)) { 
          const offset = syncData.active ? (syncData.offsets[id] || 0) : 0;
          const start = syncData.active ? 0 : (data.transform.startTime || 0);
          const totalLen = (d - start) + offset;
          if (totalLen > maxTotalDuration) maxTotalDuration = totalLen; 
        }
    });
    // Clip duration on mobile to prevent extreme memory pressure
    const targetDuration = Math.min(maxTotalDuration > 0 ? maxTotalDuration : 5, isMobile ? 30 : 120); 

    Object.values(videoRefs.current).forEach(v => { if (v) v.pause(); });
    setExportStatus({ active: true, phase: 'decoding', progress: 0 });
    
    try {
      await clearStoreIDB('audioChunks');
      await decodeAndPersistAudio();
      setIsPreparing(false); 
      setExportStatus({ active: true, phase: 'encoding', progress: 0 });
      await performMp4Export({ 
        res: exportRes, 
        fps: exportFps, 
        duration: targetDuration
      });
      setExportStatus({ active: false, phase: '', progress: 0 });
    } catch (err) {
      console.error("Export failed:", err);
      setExportStatus({ active: false, phase: '', progress: 0 });
      setIsPreparing(false);
      // Use custom UI instead of alert()
      setActiveQuickTool('error_alert');
    }
  };

  const decodeAndPersistAudio = async () => {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
    const slotsToDecode = Object.entries(slots).filter(([id, data]) => !data.muted);

    for (let i = 0; i < slotsToDecode.length; i++) {
      const [slotId, data] = slotsToDecode[i];
      setExportStatus({ active: true, phase: 'decoding', progress: Math.round(((i + 0.1) / slotsToDecode.length) * 100) });
      try {
        const response = await fetch(data.url);
        const arrayBuffer = await response.arrayBuffer();
        const fullBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const totalChunks = Math.ceil(fullBuffer.duration);
        const db = await initDB();
        const tx = db.transaction('audioChunks', 'readwrite');
        const store = tx.objectStore('audioChunks');

        for (let c = 0; c < totalChunks; c++) {
          const startSample = c * 44100;
          const endSample = Math.min((c + 1) * 44100, fullBuffer.length);
          const chunkLength = endSample - startSample;
          const pcmData = new Float32Array(chunkLength * 2); 
          pcmData.set(fullBuffer.getChannelData(0).subarray(startSample, endSample), 0);
          const rChan = fullBuffer.numberOfChannels > 1 ? fullBuffer.getChannelData(1) : fullBuffer.getChannelData(0);
          pcmData.set(rChan.subarray(startSample, endSample), chunkLength);
          await new Promise((res) => {
            const req = store.put(pcmData, `slot_${slotId}_chunk_${c}`);
            req.onsuccess = res;
          });
        }
      } catch (err) {
        console.warn(`Audio decode failed for slot ${slotId}:`, err);
      }
    }
    await audioCtx.close();
  };

  const performMp4Export = async (config) => {
    let width = 1920, height = 1080;
    if (config.res === '720p') { width = 1280; height = 720; }
    else if (config.res === '4k') { width = 3840; height = 2160; }
    
    if (aspectRatio.id === 'vertical') { [width, height] = [height, width]; }
    else if (aspectRatio.id === 'portrait') { width = Math.floor(height * 0.8); }
    else if (aspectRatio.id === 'square') { width = height = (config.res === '4k' ? 2160 : (config.res === '1080p' ? 1080 : 720)); }
    
    width = Math.floor(width / 2) * 2;
    height = Math.floor(height / 2) * 2;

    // Mobile specific bitrate scaling to prevent OOM
    const bitrateMultiplier = isMobile ? 0.3 : 1; 
    const bitrate = Math.floor((config.res === '4k' ? 25_000_000 : (config.res === '1080p' ? 8_000_000 : 3_000_000)) * bitrateMultiplier);
    const SAMPLE_RATE = 44100;
    const CHANNELS = 2;

    const dummyCanvas = document.createElement('canvas');
    dummyCanvas.width = width; dummyCanvas.height = height;
    const offscreenCanvas = dummyCanvas.transferControlToOffscreen();

    const worker = new Worker(EXPORT_WORKER_BLOB);
    let resolveAck;
    let resolveExport, rejectExport;
    const finishExport = new Promise((res, rej) => { resolveExport = res; rejectExport = rej; });

    worker.onmessage = (e) => {
      const { type, data } = e.data;
      if (type === 'ACK' && resolveAck) resolveAck();
      if (type === 'FINISHED') {
        const mp4Blob = new Blob([data], { type: 'video/mp4' });
        downloadFinalMp4(mp4Blob, config);
        worker.terminate();
        resolveExport();
      }
      if (type === 'ERROR') {
        worker.terminate();
        rejectExport(new Error(data));
      }
    };

    worker.postMessage({
      type: 'INIT',
      data: { 
        width, height, fps: config.fps, bitrate, 
        sampleRate: SAMPLE_RATE, numberOfChannels: CHANNELS,
        offscreenCanvas
      }
    }, [offscreenCanvas]);

    const totalFrames = Math.ceil(config.duration * config.fps);
    const frameInterval = 1 / config.fps;
    const scaleFactor = width / 1080;
    const scaledSpacing = spacing * scaleFactor;
    const scaledRadius = radius * scaleFactor;

    const seekVideo = (video, time) => new Promise((resolve) => {
      if (!video) return resolve();
      const onSeeked = () => { video.removeEventListener('seeked', onSeeked); resolve(); };
      video.addEventListener('seeked', onSeeked);
      // Small epsilon to prevent black frames on certain hardware decoders
      video.currentTime = Math.max(0, Math.min(time, video.duration - 0.05));
      // Buffer for mobile hardware to stabilize
      setTimeout(resolve, isMobile ? 350 : 80);
    });

    let totalSamplesProcessed = 0;
    const db = await initDB();

    for (let i = 0; i < totalFrames; i++) {
      const virtualTime = i * frameInterval;
      setExportStatus(prev => ({ ...prev, progress: Math.round((i / totalFrames) * 100) }));

      // Sequential seeking for mobile stability - prevents hardware decoder overload
      for (const [id, slot] of Object.entries(slots)) {
        const video = videoRefs.current[id];
        if (!video || !video.src) continue;
        const delay = syncData.active ? (syncData.offsets[id] || 0) : 0;
        const baseStart = syncData.active ? 0 : (slot.transform.startTime || 0);
        const targetTime = baseStart + (virtualTime - delay);
        
        // Only seek if the time has actually changed significantly to save battery/RAM
        if (Math.abs(video.currentTime - targetTime) > 0.01) {
          await seekVideo(video, targetTime);
        }
      }

      const sourceFrames = {};
      const transferList = [];
      selectedTemplate.layout.forEach((layout, idx) => {
        const video = videoRefs.current[idx];
        if (video && video.readyState >= 2) {
          const delay = syncData.active ? (syncData.offsets[idx] || 0) : 0;
          if (virtualTime >= delay) {
            try {
              const frame = new VideoFrame(video);
              sourceFrames[idx] = frame;
              transferList.push(frame);
            } catch(e) {}
          }
        }
      });

      const layoutData = selectedTemplate.layout.map((item, idx) => {
        const slotData = slots[idx];
        if (!slotData) return null;
        return {
          slotId: idx,
          x: item.x, y: item.y, w: item.w, h: item.h,
          transform: slotData.transform,
          filter: (slotData.filterId && slotData.filterId !== 'none' ? FILTERS.find(f => f.id === slotData.filterId)?.css : 'none')
        };
      }).filter(Boolean);

      const nextTotalSamples = Math.floor((i + 1) * frameInterval * SAMPLE_RATE);
      const samplesNeeded = nextTotalSamples - totalSamplesProcessed;
      const mixedBuffer = new Float32Array(samplesNeeded * CHANNELS);
      const leftPlane = mixedBuffer.subarray(0, samplesNeeded);
      const rightPlane = mixedBuffer.subarray(samplesNeeded, samplesNeeded * 2);

      const tx = db.transaction('audioChunks', 'readonly');
      const store = tx.objectStore('audioChunks');

      for (const [slotId, slotData] of Object.entries(slots)) {
        if (slotData.muted) continue;
        const delay = syncData.active ? (syncData.offsets[slotId] || 0) : 0;
        const baseStart = syncData.active ? 0 : (slotData.transform.startTime || 0);
        const absoluteVideoTime = baseStart + (totalSamplesProcessed / SAMPLE_RATE) - delay;
        if (absoluteVideoTime < 0) continue; 

        const chunkIndex = Math.floor(absoluteVideoTime);
        const chunkOffset = Math.floor((absoluteVideoTime - chunkIndex) * SAMPLE_RATE);
        const cacheKey = `slot_${slotId}_chunk_${chunkIndex}`;
        const pcmChunk = await new Promise(res => store.get(cacheKey).onsuccess = e => res(e.target.result));
        
        if (pcmChunk) {
          const chunkActualLength = pcmChunk.length / 2;
          for (let s = 0; s < samplesNeeded; s++) {
            const idx = chunkOffset + s;
            if (idx < chunkActualLength) {
              leftPlane[s] += pcmChunk[idx] * slotData.volume;
              rightPlane[s] += pcmChunk[idx + chunkActualLength] * slotData.volume;
            }
          }
        }
      }

      const audioData = new AudioData({
        format: 'f32-planar', sampleRate: SAMPLE_RATE,
        numberOfFrames: samplesNeeded, numberOfChannels: CHANNELS,
        timestamp: Math.round((totalSamplesProcessed / SAMPLE_RATE) * 1_000_000),
        data: mixedBuffer
      });

      const ackPromise = new Promise(res => { resolveAck = res; });
      worker.postMessage({
        type: 'ENCODE_FRAME',
        data: {
          timestamp: i * (1_000_000 / config.fps),
          sourceFrames, audioData, keyFrame: i % (config.fps * 2) === 0,
          layoutConfig: layoutData, bgColor, spacing: scaledSpacing, radius: scaledRadius
        }
      }, [...transferList, audioData]);
      
      await ackPromise;
      totalSamplesProcessed += samplesNeeded;
      
      // Gentle throttle to allow mobile CPU to breathe
      if (i % (isMobile ? 1 : 2) === 0) await new Promise(r => setTimeout(r, isMobile ? 15 : 1));
    }

    setExportStatus(prev => ({ ...prev, phase: 'finalizing', progress: 100 }));
    worker.postMessage({ type: 'FINALIZE' });
    await finishExport;
  };

  const removeVideo = (index, e) => {
    e.stopPropagation(); clearSlotMemory(index);
    setSlots(prev => { const n = { ...prev }; delete n[index]; return n; });
    removeFromIDB('assets', index); 
    if (activeEditIndex === index) setActiveEditIndex(null);
  };

  const nudgeVideoFrame = (el) => {
    if (!el || !isMobile) return;
    const originalTime = el.currentTime;
    el.currentTime = 0.001;
    setTimeout(() => { if (el) el.currentTime = originalTime; }, 100);
  };

  if (!isLoaded) return (
    <div className={`min-h-screen ${isDarkMode ? 'bg-[#050505]' : 'bg-[#FAFAFA]'} flex items-center justify-center transition-colors duration-500`}>
        <div className="animate-pulse flex flex-col items-center gap-6 text-neutral-400">
           <Layout className="w-10 h-10" />
           <span className="text-[10px] font-extrabold uppercase tracking-[0.4em]">Restoring Session</span>
        </div>
    </div>
  );

  if (!selectedTemplate) {
    return (
      <div className={`min-h-screen ${isDarkMode ? 'bg-[#050505] text-neutral-100' : 'bg-[#FAFAFA] text-[#050505]'} flex flex-col font-sans transition-colors duration-500`}>
        <header className="py-24 px-6 text-center relative">
          <button onClick={() => setIsDarkMode(!isDarkMode)} className={`absolute top-10 right-10 p-3 rounded-full transition-all active:scale-90 ${isDarkMode ? 'bg-white/5 text-white hover:bg-white/10' : 'bg-black/5 text-black hover:bg-black/10'}`}>
            {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
          </button>
          <div className={`inline-flex items-center justify-center p-4 rounded-2xl mb-8 shadow-2xl ${isDarkMode ? 'bg-white/5 border border-white/10' : 'bg-black/5 border border-black/10'}`}>
            <Layout className={isDarkMode ? 'text-white w-7 h-7' : 'text-black w-7 h-7'} />
          </div>
          <h1 className="text-5xl sm:text-6xl font-extrabold tracking-tighter mb-5">StitchPro.</h1>
          <p className={`text-sm sm:text-base max-w-md mx-auto font-bold uppercase tracking-[0.2em] leading-relaxed transition-colors duration-500`}>
            Professional framing for creators.
          </p>
        </header>
        <main className="flex-1 px-4 sm:px-8 max-w-6xl mx-auto w-full pb-20">
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-12 sm:gap-20">
            {TEMPLATES.map((template) => (
              <button key={template.id} onClick={() => handleTemplateSelect(template)} className="relative group flex flex-col items-center transition-all duration-500 active:scale-90">
                <div className={`w-32 h-32 sm:w-40 sm:h-40 border-2 rounded-xl overflow-hidden transition-all duration-500 group-hover:scale-105 ${isDarkMode ? 'bg-white/60 group-hover:bg-[#1ca3ec] border-white/60 group-hover:border-[#1ca3ec]' : 'bg-black/60 group-hover:bg-[#1ca3ec] border-black/60 group-hover:border-[#1ca3ec]'}`} 
                  style={{ display: 'grid', gridTemplateColumns: `repeat(${template.cols}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${template.rows}, minmax(0, 1fr))`, gap: '2px', padding: '0' }}
                >
                  {Array.from({ length: template.sections }).map((_, i) => (
                    <div key={i} className={`${isDarkMode ? 'bg-black' : 'bg-white'} transition-colors duration-500 rounded-sm`} style={template.customSpans?.[i] || {}} />
                  ))}
                </div>
              </button>
            ))}
          </div>
        </main>
      </div>
    );
  }

  const PrimaryButtonStyle = (variant = 'standard') => {
    const base = 'px-4 py-2.5 sm:px-5 sm:py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 border-2 active:scale-95 disabled:opacity-50';
    if (variant === 'danger') return `${base} border-red-500/50 text-red-500 hover:bg-red-500 hover:text-white`;
    if (variant === 'neutral') return `${base} ${isDarkMode ? 'border-white/10 text-neutral-400 hover:text-white hover:bg-white/10' : 'border-black/10 text-neutral-500 hover:text-black hover:bg-black/10'}`;
    return `${base} ${isDarkMode ? 'border-white text-white hover:bg-white hover:text-black' : 'border-black text-black hover:bg-black hover:text-white'}`;
  };

  return (
    <div className={`h-[100dvh] font-sans overflow-hidden flex flex-col transition-colors duration-500 ${isDarkMode ? 'bg-[#050505] text-neutral-100' : 'bg-[#FAFAFA] text-[#050505]'}`}>
      <style>{`
        input[type=range].smooth-slider {

        .tab-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
      `}</style>

      {/* Main App Header */}
      <header className={`h-14 sm:h-16 px-4 sm:px-8 flex items-center justify-between border-b transition-all duration-500 z-[110] shrink-0 ${isDarkMode ? 'border-white/5 bg-[#050505]' : 'border-black/5 bg-white'}`}>
        <button onClick={handleBack} className={`p-2 transition-all hover:scale-110 active:scale-90 ${isDarkMode ? 'text-neutral-500 hover:text-white' : 'text-neutral-400 hover:text-black'}`}>
          <ArrowLeft size={18} strokeWidth={2.5} />

        <div className="flex items-center gap-3 sm:gap-4 flex-1 justify-end">
          <div className={`flex rounded-xl p-1 border gap-1 backdrop-blur-md transition-all hide-scrollbar overflow-x-auto max-w-[160px] sm:max-w-none ${isDarkMode ? 'bg-white/5 border-white/10' : 'bg-black/5 border-black/10'}`}>
            {ASPECT_RATIOS.map(ratio => (

            <div 
              className={`relative transition-all duration-700 ease-[cubic-bezier(0.4,0,0.2,1)] overflow-hidden ${isDarkMode ? 'ring-1 ring-white/10 bg-black shadow-[0_40px_100px_-40px_rgba(0,0,0,1)]' : 'ring-1 ring-black/10 bg-white shadow-[0_40px_100px_-40px_rgba(0,0,0,0.2)]'}`}

            >

                    style={{ borderRadius: `${radius}px`, ...(selectedTemplate.customSpans?.[i] || {}), borderColor: isEditing ? HIGHLIGHT_COLOR : 'transparent', minWidth: 0, minHeight: 0 }}
                    onClick={(e) => { e.stopPropagation(); !slot?.url ? triggerUpload(i) : setActiveEditIndex(i); }} draggable={!!slot?.url && !isEditing}

                  >

                          onTimeUpdate={(e) => { if(activeEditIndex === i) setInspectorCurrentTime(e.target.currentTime); }}
                          onLoadedData={(e) => nudgeVideoFrame(e.target)}
                          className={`absolute inset-0 w-full h-full object-cover pointer-events-none transition-opacity duration-1000 ${activeEditIndex !== null && !isEditing ? 'opacity-20' : 'opacity-100'}`}

                          loop playsInline muted={slot.muted} preload="metadata"
                        />
                        <div className={`absolute bottom-3 left-3 px-2 py-1 bg-black/60 backdrop-blur-2xl border border-white/10 rounded-lg text-[8px] font-black text-white tracking-widest transition-all pointer-events-none flex items-center gap-2 shadow-2xl truncate max-w-[80%] uppercase ${isEditing ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}>
                          <Clock size={8} className="text-blue-400" /> {formatTime(slot.duration)}
                        </div>
                        {syncData.active && slot.anchor > 0 && (
                          <div className="absolute top-3 left-3 w-6 h-6 rounded-full bg-blue-500 flex items-center justify-center text-white shadow-lg shadow-blue-500/50 z-20 scale-75">
                            <Anchor size={12} />
                          </div>
                        )}
                        {isEditing && (
                          <div className="absolute inset-0 z-40 cursor-move" onPointerDown={(e) => handlePanStart(e, i)} onPointerMove={(e) => handlePanMove(e, i)} onPointerUp={handlePanEnd} onPointerCancel={handlePanEnd} onPointerLeave={handlePanEnd} />
                        )}
                        <div className={`absolute inset-0 bg-black/50 transition-all duration-500 backdrop-blur-[2px] z-20 ${isEditing ? 'opacity-0 pointer-events-none' : 'opacity-0 group-hover:opacity-100'}`}>
                          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex gap-3 scale-90 group-hover:scale-100 transition-transform duration-500">
                            <button onClick={(e) => { e.stopPropagation(); setActiveEditIndex(i); }} className="w-10 h-10 bg-white text-black rounded-xl flex items-center justify-center hover:bg-blue-500 hover:text-white transition-all active:scale-75 shadow-2xl">
                              <Pencil size={18} />
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); removeVideo(i, e); }} className="w-10 h-10 bg-black/60 text-white border border-white/10 rounded-xl flex items-center justify-center hover:bg-red-500 hover:border-red-500 transition-all active:scale-75 shadow-2xl backdrop-blur-xl">
                              <Trash2 size={18} />
                            </button>
                          </div>
                        </div>
                      </>
                    ) : (
                      <div className="absolute inset-0 flex items-center justify-center cursor-pointer group z-10">
                        <div className={`w-12 h-12 sm:w-14 sm:h-14 rounded-full border-2 border-dashed flex items-center justify-center transition-all duration-700 ${isDarkMode ? 'border-white/10 bg-white/[0.02] group-hover:bg-[#1ca3ec]/20 group-hover:border-[#1ca3ec]/50' : 'border-black/20 bg-black/[0.02] group-hover:bg-[#1ca3ec]/20 group-hover:border-[#1ca3ec]/50'}`}>
                            <Plus size={20} className={`transition-colors duration-500`} style={{ color: isDarkMode ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.6)' }} />
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Quick Control Bar (Bottom) */}
          <div className={`h-20 sm:h-28 w-full shrink-0 flex items-center justify-center px-6 transition-all duration-700 z-[100] relative ${activeEditIndex !== null ? 'translate-y-2 opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'} ${isDarkMode ? 'border-t border-white/5 bg-[#050505]' : 'border-t border-black/5 bg-white'}`}>
            <div className="flex items-center justify-center gap-4 sm:gap-6">
              <div className="relative">
                <QuickToolOverlay title="Gaps" icon={ArrowLeftRight} value={spacing} min={0} max={40} step={0.1} active={activeQuickTool === 'spacing'} onChange={setSpacing} onClose={() => setActiveQuickTool(null)} isDarkMode={isDarkMode} />
                <button onClick={(e) => { e.stopPropagation(); setActiveQuickTool(activeQuickTool === 'spacing' ? null : 'spacing'); }} className={`w-10 h-10 sm:w-14 sm:h-14 rounded-xl sm:rounded-2xl flex items-center justify-center transition-all active:scale-90 border-2 ${activeQuickTool === 'spacing' ? 'bg-blue-500 border-blue-400 text-white shadow-lg' : (isDarkMode ? 'bg-white/5 border-white/5 text-neutral-500 hover:text-white' : 'bg-black/5 border-black/5 text-neutral-400 hover:text-black')}`}>
                  <ArrowLeftRight size={16} />
                </button>
              </div>

              <div className="relative">
                <QuickToolOverlay title="Corners" icon={BoxSelect} value={radius} min={0} max={100} step={0.1} active={activeQuickTool === 'radius'} onChange={setRadius} onClose={() => setActiveQuickTool(null)} isDarkMode={isDarkMode} />
                <button onClick={(e) => { e.stopPropagation(); setActiveQuickTool(activeQuickTool === 'radius' ? null : 'radius'); }} className={`w-10 h-10 sm:w-14 sm:h-14 rounded-xl sm:rounded-2xl flex items-center justify-center transition-all active:scale-90 border-2 ${activeQuickTool === 'radius' ? 'bg-blue-500 border-blue-400 text-white shadow-lg' : (isDarkMode ? 'bg-white/5 border-white/5 text-neutral-500 hover:text-white' : 'bg-black/5 border-black/5 text-neutral-400 hover:text-black')}`}>
                  <BoxSelect size={16} />
                </button>
              </div>

              <div className="relative">
                <div className={`absolute bottom-full mb-4 left-1/2 -translate-x-1/2 w-44 p-6 rounded-[2rem] border shadow-2xl animate-in fade-in zoom-in slide-in-from-bottom-2 z-[110] ${activeQuickTool === 'color' ? 'block' : 'hidden'} ${isDarkMode ? 'bg-[#111] border-white/10 backdrop-blur-2xl' : 'bg-white border-black/10 backdrop-blur-2xl'}`}>
                  <div className="flex justify-between items-center mb-6 px-1">
                    <span className="text-[9px] font-black uppercase tracking-[0.2em] opacity-50">Canvas Base</span>
                  </div>
                  <div className="flex justify-center gap-4">
                    <button onClick={() => setBgColor('#000000')} className={`w-10 h-10 rounded-full border-2 bg-black transition-all ${bgColor === '#000000' ? 'border-blue-500 scale-110 shadow-lg' : 'border-white/10'}`} />
                    <button onClick={() => setBgColor('#ffffff')} className={`w-10 h-10 rounded-full border-2 bg-white transition-all ${bgColor === '#ffffff' ? 'border-blue-500 scale-110 shadow-lg' : 'border-black/10'}`} />
                    <button onClick={() => colorInputRef.current.click()} className="w-10 h-10 rounded-full border-2 border-white/10 bg-neutral-800 flex items-center justify-center text-white/40 hover:text-white transition-all hover:bg-neutral-700 active:scale-90"><Pipette size={16}/></button>
                  </div>
                </div>
                <button onClick={(e) => { e.stopPropagation(); setActiveQuickTool(activeQuickTool === 'color' ? null : 'color'); }} className={`w-10 h-10 sm:w-14 sm:h-14 rounded-xl sm:rounded-2xl flex items-center justify-center transition-all active:scale-90 border-2 ${activeQuickTool === 'color' ? 'bg-blue-500 border-blue-400 text-white shadow-lg' : (isDarkMode ? 'bg-white/5 border-white/5 text-neutral-500 hover:text-white' : 'bg-black/5 border-black/5 text-neutral-400 hover:text-black')}`}>
                  <Palette size={16} />
                </button>
              </div>

              <button onClick={toggleGlobalPlay} className={`w-12 h-12 sm:w-18 sm:h-18 rounded-2xl sm:rounded-[2rem] flex items-center justify-center transition-all active:scale-95 border-2 shadow-2xl ${isDarkMode ? 'bg-black border-white text-white hover:bg-white hover:text-black' : 'bg-white border-black text-black hover:bg-black hover:text-white'}`}>
                {isPlaying ? <Pause size={24} fill="currentColor" strokeWidth={0} /> : <Play size={24} fill="currentColor" strokeWidth={0} className="ml-0.5" />}
              </button>
            </div>
          </div>
        </main>

        {/* Layer Inspector Sidebar */}
        <aside className={`relative shrink-0 flex flex-col z-[110] shadow-[0_0_80px_rgba(0,0,0,0.5)] transition-all duration-700 ease-[cubic-bezier(0.2,0,0,1)] border-t sm:border-t-0 sm:border-l ${activeEditIndex !== null ? 'h-[50vh] sm:h-full w-full sm:w-[320px] md:w-[340px] opacity-100 translate-y-0' : 'h-0 sm:h-full w-full sm:w-0 opacity-0 overflow-hidden border-none translate-y-full sm:translate-y-0'} ${isDarkMode ? 'bg-[#050505] border-white/5' : 'bg-white border-black/5'}`}>
          <div className="flex flex-col h-full w-full">
            {/* Inspector Header */}
            <div className={`h-14 sm:h-16 px-4 flex items-center shrink-0 border-b ${isDarkMode ? 'border-white/5 bg-[#080808]' : 'border-black/5 bg-neutral-50'}`}>
              <button onClick={() => setActiveEditIndex(null)} className={`p-2 -ml-2 transition-all hover:scale-110 active:scale-90 ${isDarkMode ? 'text-neutral-400 hover:text-white' : 'text-neutral-500 hover:text-black'}`}>
                <ArrowLeft size={18} strokeWidth={3} />
              </button>
              
              <div className="flex-1 flex items-center justify-center gap-4">
                <button onClick={() => navigateClips(-1)} className={`p-1 transition-all ${isDarkMode ? 'text-neutral-600 hover:text-white' : 'text-neutral-300 hover:text-black'}`}><ChevronsLeft size={16}/></button>
                <div className="flex items-center gap-2">
                    <Layers size={10} className="text-blue-500 opacity-60" />
                    <h2 className="text-[10px] font-black uppercase tracking-[0.4em] opacity-40">Layer {activeEditIndex + 1}</h2>
                </div>
                <button onClick={() => navigateClips(1)} className={`p-1 transition-all ${isDarkMode ? 'text-neutral-600 hover:text-white' : 'text-neutral-300 hover:text-black'}`}><ChevronsRight size={16}/></button>
              </div>

              <button onClick={(e) => { e.stopPropagation(); removeVideo(activeEditIndex, e); }} className="p-2 text-red-500/50 hover:text-red-500 transition-colors">
                <Trash2 size={16} />
              </button>
            </div>

            {/* Global Inspector Navigation */}
            <div className={`flex border-b shrink-0 ${isDarkMode ? 'border-white/5' : 'border-black/5'}`}>
                {[
                  { id: 'sync', icon: Anchor, label: 'Sync' },
                  { id: 'transform', icon: SlidersHorizontal, label: 'View' },
                  { id: 'audio', icon: Music, label: 'Mix' }
                ].map(tab => (
                  <button key={tab.id} onClick={() => setEditorTab(tab.id)} className={`flex-1 py-3.5 flex flex-col items-center gap-1.5 transition-all border-b-2 ${editorTab === tab.id ? 'text-blue-500 border-blue-500 bg-blue-500/5' : 'text-neutral-500 opacity-50 border-transparent hover:opacity-100'}`}>
                    <tab.icon size={13} strokeWidth={editorTab === tab.id ? 3 : 2} />
                    <span className="text-[8px] font-black uppercase tracking-[0.2em]">{tab.label}</span>
                  </button>
                ))}
            </div>

            {/* Inspector Content */}
            <div className="flex-1 overflow-y-auto p-5 sm:p-7 space-y-12 pb-24 sm:pb-8 hide-scrollbar">
              
              {/* SYNC PANEL */}
              <div className={`${editorTab === 'sync' ? 'block' : 'hidden'} space-y-10 tab-transition animate-in fade-in duration-500`}>
                <div className="space-y-6">
                    <div className="flex items-center gap-3"><Anchor size={12} className="text-blue-500" strokeWidth={3} /><h3 className="font-black text-[10px] uppercase tracking-[0.4em] opacity-40">Timing Anchor</h3></div>
                    <div className="grid grid-cols-2 gap-4">
                       <div className={`p-4 rounded-2xl border transition-all ${isDarkMode ? 'bg-white/5 border-white/5' : 'bg-black/5 border-black/5'}`}>
                         <label className="text-[8px] font-bold uppercase tracking-[0.1em] opacity-30 block mb-2">Marked In</label>
                         <div className="text-[12px] font-black tabular-nums text-blue-500">{formatTime(slots[activeEditIndex]?.anchor || 0)}</div>
                       </div>
                       <div className={`p-4 rounded-2xl border transition-all ${syncData.active ? (isDarkMode ? 'bg-blue-500/10 border-blue-500/30' : 'bg-blue-50/50 border-blue-200') : (isDarkMode ? 'bg-white/5 border-white/5 opacity-50' : 'bg-black/5 border-black/5 opacity-50')}`}>
                         <label className="text-[8px] font-bold uppercase tracking-[0.1em] opacity-30 block mb-2">Shift</label>
                         <div className="text-[12px] font-black tabular-nums">{syncData.active ? `+${(syncData.offsets[activeEditIndex] || 0).toFixed(2)}s` : '--'}</div>
                       </div>
                    </div>
                    <button onClick={() => { const vid = videoRefs.current[activeEditIndex]; if (vid) updateSlot(activeEditIndex, { anchor: vid.currentTime }); }} className={`${PrimaryButtonStyle()} w-full py-4 bg-blue-500 border-blue-400 text-white shadow-lg shadow-blue-500/20`}>
                      <Target size={14} strokeWidth={3} /> <span className="text-[10px] font-black">ALIGN ANCHOR</span>
                    </button>
                </div>

                <div className="space-y-4">
                  <div className={`p-5 rounded-3xl border ${isDarkMode ? 'bg-[#0a0a0a] border-white/5 shadow-inner' : 'bg-neutral-50 border-black/5 shadow-inner'}`}>
                    <div className="flex items-center justify-between mb-6">
                      <span className="text-[11px] font-black tabular-nums opacity-60 tracking-wider">{formatTime(inspectorCurrentTime)}</span>
                      <div className="flex gap-2">
                        <button onClick={() => handleInspectorStep(-1)} className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all active:scale-75 ${isDarkMode ? 'bg-white/5 hover:bg-white/10' : 'bg-black/5 hover:bg-black/10'}`}><ChevronLeft size={16}/></button>
                        <button onClick={() => handleInspectorStep(1)} className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all active:scale-75 ${isDarkMode ? 'bg-white/5 hover:bg-white/10' : 'bg-black/5 hover:bg-black/10'}`}><ChevronRight size={16}/></button>
                      </div>
                    </div>
                    <div className="relative h-10 flex items-center">
                      <div className="absolute inset-0 pointer-events-none flex items-center"><div className="w-full h-1.5 bg-neutral-500/20 rounded-full" /></div>
                      <div className="absolute w-2 h-5 bg-blue-500/80 -translate-x-1/2 rounded-full blur-[2px] transition-all" style={{ left: `${((slots[activeEditIndex]?.anchor || 0) / (slots[activeEditIndex]?.duration || 1)) * 100}%` }} />
                      <div className="absolute w-1.5 h-6 bg-white -translate-x-1/2 rounded-full z-10 transition-all border border-black/10 shadow-sm" style={{ left: `${((slots[activeEditIndex]?.anchor || 0) / (slots[activeEditIndex]?.duration || 1)) * 100}%` }} />
                      <input type="range" min="0" max={slots[activeEditIndex]?.duration || 100} step="0.001" value={inspectorCurrentTime} onInput={(e) => handleLinkedScrub(parseFloat(e.target.value))} className="smooth-slider w-full z-20" />
                    </div>
                  </div>
                </div>
              </div>

              {/* VIEW PANEL */}
              <div className={`${editorTab === 'transform' ? 'block' : 'hidden'} space-y-10 pt-2 tab-transition animate-in fade-in duration-500`}>
                {[
                  { label: 'Magnification', key: 'zoom', min: 1, max: 4, step: 0.01, icon: ZoomIn }, 
                  { label: 'Horizontal Shift', key: 'x', min: -100, max: 100, step: 0.5, icon: MoveHorizontal }, 
                  { label: 'Vertical Shift', key: 'y', min: -100, max: 100, step: 0.5, icon: MoveVertical }
                ].map(ctrl => (
                  <div key={ctrl.key} className="space-y-4">
                    <div className="flex justify-between items-center text-[9px] font-black uppercase tracking-widest">
                      <div className="flex items-center gap-2 opacity-40">
                        <ctrl.icon size={12} strokeWidth={3} />
                        <span>{ctrl.label}</span>
                      </div>
                      <span className="tabular-nums opacity-60 bg-blue-500/10 text-blue-500 px-2.5 py-1 rounded-lg border border-blue-500/10">{Number(slots[activeEditIndex]?.transform[ctrl.key] || 0).toFixed(1)}</span>
                    </div>
                    <input type="range" min={ctrl.min} max={ctrl.max} step={ctrl.step} value={slots[activeEditIndex]?.transform[ctrl.key] || 0} onInput={(e) => updateSlot(activeEditIndex, { transform: { ...slots[activeEditIndex].transform, [ctrl.key]: Number(e.target.value) } })} className="smooth-slider w-full" />
                  </div>
                ))}
              </div>

              {/* MIX PANEL */}
              <div className={`${editorTab === 'audio' ? 'block' : 'hidden'} space-y-10 pt-2 tab-transition animate-in fade-in duration-500`}>
                <div className="space-y-6">
                  <div className="flex justify-between text-[9px] font-black uppercase tracking-widest opacity-40">
                    <div className="flex items-center gap-2"><Speaker size={12} strokeWidth={3}/><span>Gain Control</span></div>
                    <span>{slots[activeEditIndex]?.muted ? 'Silenced' : `${Math.round(slots[activeEditIndex]?.volume * 100)}%`}</span>
                  </div>
                  <div className="flex items-center gap-5">
                    <button onClick={() => updateSlot(activeEditIndex, { muted: !slots[activeEditIndex].muted })} className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all active:scale-90 border-2 ${slots[activeEditIndex]?.muted ? 'bg-red-500 border-red-400 text-white shadow-lg' : (isDarkMode ? 'bg-blue-500/10 border-blue-500/30 text-blue-500' : 'bg-blue-50 border-blue-200 text-blue-500')}`}>
                      {slots[activeEditIndex]?.muted ? <VolumeX size={20} strokeWidth={3}/> : <Volume2 size={20} strokeWidth={3}/>}
                    </button>
                    <input type="range" min="0" max="1" step="0.01" value={slots[activeEditIndex]?.volume || 0} onChange={(e) => updateSlot(activeEditIndex, { volume: parseFloat(e.target.value) })} className="smooth-slider flex-1" />
                  </div>
                </div>

                <div className="flex flex-col gap-3 pt-14">
                  <button onClick={() => updateSlot(activeEditIndex, { transform: { zoom: 1, x: 0, y: 0, startTime: 0 }, anchor: 0, filterId: 'none' })} className={`${PrimaryButtonStyle('neutral')} py-4 border-dashed`}>
                    <RotateCcw size={14} strokeWidth={3}/> <span className="text-[9px] font-black tracking-[0.2em]">RESET ALL PARAMETERS</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </aside>

        {/* RENDERING / EXPORT STATUS HUD */}
        {exportStatus.active && (
          <div className="absolute top-4 sm:top-10 left-1/2 -translate-x-1/2 z-[200] w-[calc(100%-2rem)] sm:w-auto animate-in slide-in-from-top-10 px-4">
            <div className={`backdrop-blur-3xl border p-4 sm:p-6 rounded-[2rem] shadow-2xl flex items-center gap-4 sm:gap-10 ${isDarkMode ? 'bg-[#0a0a0a]/90 border-white/10' : 'bg-white/90 border-black/10'}`}>
              <div className="relative w-12 h-12 sm:w-20 sm:h-20 rounded-xl overflow-hidden flex items-center justify-center bg-black border border-white/5">
                 <FileVideo className="w-6 h-6 animate-pulse text-blue-500" />
              </div>
              <div className="flex-1 min-w-[140px] sm:min-w-[200px]">
                <div className="flex justify-between items-center mb-2 sm:mb-3">
                  <span className="text-[8px] sm:text-[10px] font-black uppercase tracking-widest text-blue-400">
                    {exportStatus.phase === 'decoding' ? 'Syncing' : (exportStatus.phase === 'encoding' ? 'Rendering' : 'Packaging File')}
                  </span>
                  <span className="text-[9px] sm:text-[11px] font-black tabular-nums">{exportStatus.progress}%</span>
                </div>
                <div className="w-full h-1 sm:h-2 bg-white/5 rounded-full overflow-hidden">
                  <div className={`h-full bg-blue-500 transition-all duration-700 shadow-[0_0_15px_rgba(59,130,246,0.5)]`} style={{ width: `${exportStatus.progress}%` }} />
                </div>
              </div>
            </div>
          </div>
        )}

        {/* PREPARING OVERLAY */}
        {isPreparing && (
          <div className="fixed inset-0 z-[300] flex items-center justify-center bg-black/95 backdrop-blur-3xl">
              <div className="flex flex-col items-center gap-10 text-white text-center">
                <div className="relative flex items-center justify-center"><Loader2 className="w-20 h-20 animate-spin text-white/5" /><Layout className="absolute w-8 h-8 text-blue-500 opacity-50" /></div>
                <div className="space-y-4 px-6">
                  <span className="text-xs font-black uppercase tracking-[0.8em] block">Spinning Up Engine</span>
                  <span className="text-[8px] opacity-30 uppercase tracking-[0.4em] font-bold">Allocating stream buffers</span>
                </div>
              </div>
          </div>
        )}
      </div>

      {/* ERROR ALERT MODAL */}
      {activeQuickTool === 'error_alert' && (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-xl z-[500] flex items-center justify-center p-6" onClick={() => setActiveQuickTool(null)}>
          <div className={`max-w-md w-full p-8 rounded-[2rem] border transition-all animate-in zoom-in-95 ${isDarkMode ? 'bg-[#1a1a1a] border-white/10' : 'bg-white border-black/10'}`}>
            <div className="flex flex-col items-center text-center gap-6">
              <div className="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center text-red-500">
                <AlertTriangle size={32} />
              </div>
              <h3 className="text-xl font-bold">Export Failed</h3>
              <p className="text-sm opacity-60 leading-relaxed">The browser ran out of memory or the hardware decoder crashed. Try a lower resolution (720p) or a shorter duration.</p>
              <button onClick={() => setActiveQuickTool(null)} className={PrimaryButtonStyle()}>DISMISS</button>
            </div>
          </div>
        </div>
      )}

      {/* EXPORT MASTER MODAL */}
      {showExportModal && !exportStatus.active && (
        <div className="fixed inset-0 bg-black/90 backdrop-blur-2xl z-[400] flex items-center justify-center p-6">
          <div className={`w-full max-w-lg rounded-[2.5rem] border shadow-2xl overflow-hidden transition-all animate-in zoom-in-95 duration-500 ${isDarkMode ? 'bg-[#0a0a0a] border-white/10' : 'bg-white border-black/10'}`}>
            <div className="p-8 sm:p-10 flex justify-between items-center">
              <div className="flex items-center gap-3">
                 <Download size={14} className="text-blue-500" strokeWidth={3} />
                 <h2 className="text-[10px] font-black uppercase tracking-[0.6em] opacity-40">Export Master</h2>
              </div>
              <button onClick={() => setShowExportModal(false)} className={`p-4 rounded-full transition-all active:scale-90 ${isDarkMode ? 'hover:bg-white/5' : 'hover:bg-black/5'}`}>
                <X size={20} />
              </button>
            </div>
            
            <div className="px-8 sm:px-10 pb-12 space-y-12">
              <div className="space-y-5">
                <div className="flex items-center justify-between px-1">
                  <label className="text-[8px] font-bold uppercase tracking-[0.3em] opacity-30">Resolution</label>
                  {isMobile && (
                    <div className="flex items-center gap-1 text-amber-500">
                      <AlertTriangle size={10} />
                      <span className="text-[8px] font-black uppercase">Mobile Optimizer Enabled</span>
                    </div>
                  )}
                </div>
                <div className="grid grid-cols-3 gap-4">
                  {['720p', '1080p', '4k'].map(res => ( 
                    <button key={res} onClick={() => setExportRes(res)} 
                      className={`py-4 sm:py-6 rounded-2xl text-[10px] font-black uppercase tracking-widest border-2 transition-all flex items-center justify-center gap-2 ${exportRes === res ? (isDarkMode ? 'border-white bg-white/10 text-white shadow-lg' : 'border-black bg-black/5 text-black shadow-lg') : (isDarkMode ? 'border-transparent text-neutral-600' : 'border-transparent text-neutral-400')}`}>
                      {res}
                    </button>
                  ))}
                </div>
              </div>

              <div className="space-y-5">
                <div className="flex items-center justify-between px-1">
                  <label className="text-[8px] font-bold uppercase tracking-[0.3em] opacity-30">Frames Per Second</label>
                </div>
                <div className="grid grid-cols-3 gap-4">
                  {[24, 30, 60].map(fps => ( 
                    <button key={fps} onClick={() => setExportFps(fps)} 
                      className={`py-4 sm:py-6 rounded-2xl text-[10px] font-black uppercase tracking-widest border-2 transition-all flex items-center justify-center gap-2 ${exportFps === fps ? (isDarkMode ? 'border-white bg-white/10 text-white shadow-lg' : 'border-black bg-black/5 text-black shadow-lg') : (isDarkMode ? 'border-transparent text-neutral-600' : 'border-transparent text-neutral-400')}`}>
                      {fps}
                    </button>
                  ))}
                </div>
              </div>

              <div className="pt-6">
                <button onClick={handleStartExportBtn} className={`${PrimaryButtonStyle()} w-full py-8 text-[12px] rounded-3xl tracking-[0.8em] shadow-[0_20px_50px_rgba(28,163,236,0.3)] bg-[#1ca3ec] border-[#1ca3ec] text-white hover:bg-[#1ca3ec]/90`}>
                  START RENDER
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
